name: Build

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux
          - os: macos-latest
            target: mac

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build:${{ matrix.target }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2.0.0
        with:
          tag_name: ${{ github.ref_name }}
          name: ekegai ${{ github.ref_name }} — Official Launch
          body: |
            ekegai is a modern desktop application that combines a node-based workflow canvas with real OS terminals.

            ## What's New
            - Node-Based Workflow Canvas — Visual workflow orchestration
            - Real OS Terminals — Fully functional terminals in each node
            - Niri-Style Terminal Tiling — Horizontal scrolling tile layout
            - Multiple Projects — Manage multiple project directories
            - VS Code-Style Sidebar — Collapsible sidebar with project groups
            - IDE Integration — Open in VS Code, Zed, Cursor, or custom
            - Terminal Persistence — Auto-save every 30 seconds
            - Dark Mode — Warm, Cursor-inspired theme

            ## Downloads
            - Linux: `.AppImage`
            - macOS: `.dmg`

            ## Requirements
            - Linux or macOS only (Windows NOT supported)
          files: release/${{ matrix.target }}/*
          draft: true
          omit_checksum: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
